name: nap-dev

services:
  db:
    image: postgres:18-alpine
    container_name: nap-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: nap_db
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-nap_db_password}
    ports:
      - "5432:5432"
    volumes:
      - nap-db-data-dev:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${SPRING_DATASOURCE_USERNAME:-postgres} -d nap_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nap-backend-dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.dev
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/nap_db
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-nap_db_password}
    ports:
      - "8080:8080"
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  nap-db-data-dev:
