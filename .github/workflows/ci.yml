name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Solo lectura del repositorio: el CI no escribe nada.
permissions:
  contents: read

# Cancela ejecuciones antiguas de la misma rama/PR cuando llega un push nuevo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Format check, build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven # Cachea ~/.m2 usando el hash del pom.xml.

      # Verifica el formato con Google Java Format (Spotless). Falla si algún
      # archivo no está formateado. Localmente: ./mvnw spotless:apply
      - name: Verify formatting (Google Java Format)
        run: ./mvnw -B --no-transfer-progress spotless:check

      # Compila, ejecuta los tests y empaqueta (incluye la generación de docs
      # de Spring REST Docs en la fase package).
      - name: Build & test
        run: ./mvnw -B --no-transfer-progress verify

      # Genera un SBOM CycloneDX con Maven (resuelve todas las transitivas con sus
      # versiones exactas). Escanear el SBOM evita que OSV-Scanner haga su propia
      # resolución Maven, que es frágil (rate limits 429 y bugs de parseo de versiones).
      - name: Generar SBOM (CycloneDX)
        run: ./mvnw -B --no-transfer-progress org.cyclonedx:cyclonedx-maven-plugin:2.9.1:makeAggregateBom

      # Escaneo de vulnerabilidades contra la base OSV. Corre en su propio contenedor
      # (sin NVD ni API key) y falla el build ante vulnerabilidades conocidas.
      - name: OSV-Scanner (escaneo de dependencias)
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        with:
          scan-args: |-
            -L
            target/bom.json
