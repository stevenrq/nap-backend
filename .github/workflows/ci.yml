name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Solo lectura del repositorio: el CI no escribe nada.
permissions:
  contents: read

# Cancela ejecuciones antiguas de la misma rama/PR cuando llega un push nuevo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Format check, build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven # Cachea ~/.m2 usando el hash del pom.xml.

      # Verifica el formato con Google Java Format (Spotless). Falla si algún
      # archivo no está formateado. Localmente: ./mvnw spotless:apply
      - name: Verify formatting (Google Java Format)
        run: ./mvnw -B --no-transfer-progress spotless:check

      # Compila, ejecuta los tests y empaqueta (incluye la generación de docs
      # de Spring REST Docs en la fase package).
      - name: Build & test
        run: ./mvnw -B --no-transfer-progress verify

      # Cachea la base de datos NVD entre ejecuciones para acelerar el escaneo.
      # La clave incluye el run_id (siempre única) para que cada ejecución guarde una
      # caché nueva con la base ya actualizada; restore-keys restaura la más reciente.
      # Así la base no se queda obsoleta y el plugin solo aplica deltas incrementales.
      - name: Cache OWASP NVD data
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: nvd-data-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            nvd-data-${{ runner.os }}-

      # 1) Descarga/actualiza la base NVD. La API es lenta/intermitente, así que se
      # reintenta hasta 3 veces (la base se cachea y cada intento avanza desde donde
      # quedó). Separado del análisis para no reintentar ante un CVE real.
      - name: Update NVD data
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          for attempt in 1 2 3; do
            echo "::group::nvd update intento $attempt"
            ./mvnw -B --no-transfer-progress org.owasp:dependency-check-maven:update-only && exit 0
            echo "::endgroup::"
            echo "Intento $attempt falló; reintentando en 20s..."
            sleep 20
          done
          echo "No se pudo actualizar la base NVD tras 3 intentos"
          exit 1

      # 2) Analiza dependencias contra la base ya cacheada (no vuelve a llamar a la NVD
      # gracias a nvdValidForHours). Falla el build ante CVEs con CVSS >= 8.
      - name: OWASP Dependency-Check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: ./mvnw -B --no-transfer-progress org.owasp:dependency-check-maven:check
