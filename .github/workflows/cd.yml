name: CD

# Se ejecuta SOLO cuando el workflow "CI" termina con éxito en main.
# Render construye la imagen desde el Dockerfile; aquí disparamos el deploy
# vía API y esperamos a que quede "live" (el job falla si el deploy falla).
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch: # Permite re-desplegar manualmente desde la pestaña Actions.

permissions:
  contents: read

# Serializa los despliegues: no canceles uno en curso ni lances dos a la vez.
concurrency:
  group: cd-render
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    # Despliega solo en dispatch manual, o cuando el CI pasó en un push a main.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main')
    steps:
      - name: Trigger Render deploy and wait
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          set -euo pipefail

          if [ -z "${RENDER_API_KEY:-}" ] || [ -z "${RENDER_SERVICE_ID:-}" ]; then
            echo "::error::Faltan los secretos RENDER_API_KEY y/o RENDER_SERVICE_ID."
            exit 1
          fi

          api="https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys"
          auth="Authorization: Bearer ${RENDER_API_KEY}"

          echo "Disparando deploy en Render…"
          response="$(curl -fsS -X POST "$api" \
            -H "$auth" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}')"
          echo "Respuesta de Render: $response"
          deploy_id="$(echo "$response" | jq -r '.id // .deploy.id')"

          if [ -z "$deploy_id" ] || [ "$deploy_id" = "null" ]; then
            echo "::error::Render no devolvió un id de deploy."
            exit 1
          fi

          echo "Deploy creado: $deploy_id"
          echo "Seguimiento: https://dashboard.render.com/web/${RENDER_SERVICE_ID}/deploys/${deploy_id}"

          # Polling hasta ~20 min (80 intentos x 15 s).
          for attempt in $(seq 1 80); do
            status="$(curl -fsS "${api}/${deploy_id}" -H "$auth" | jq -r '.status // .deploy.status')"
            echo "[$attempt] estado del deploy: $status"
            case "$status" in
              live)
                echo "✅ Deploy en vivo."
                exit 0
                ;;
              build_failed|update_failed|pre_deploy_failed|canceled|deactivated)
                echo "::error::El deploy terminó con estado: $status"
                exit 1
                ;;
            esac
            sleep 15
          done

          echo "::error::Timeout: el deploy no alcanzó el estado 'live' a tiempo."
          exit 1
